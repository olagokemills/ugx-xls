name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Type-check & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ugx-xlsx/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: ugx-xlsx

      - name: Type-check
        run: npx tsc -p tsconfig.esm2020.json --noEmit
        working-directory: ugx-xlsx

      - name: Run tests
        run: npm test
        working-directory: ugx-xlsx
